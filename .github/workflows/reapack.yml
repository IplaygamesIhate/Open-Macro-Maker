name: ReaPack Index Generator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ReaPack-Index
        run: |
          wget https://github.com/cfillion/reapack-index/releases/download/v1.2.2/reapack-index-linux-amd64
          chmod +x reapack-index-linux-amd64
          sudo mv reapack-index-linux-amd64 /usr/local/bin/reapack-index

      - name: Generate index.xml
        run: reapack-index --commit

      - name: Push index.xml to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.xml
          git commit -m "Auto-generated ReaPack index.xml" || echo "No changes to commit"
          git push